name: Preparation

on:
  push:
    tags:
      - "prepare-*.*.*+*"

permissions:
  actions: write
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out tagged commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Parse tag and generate release metadata
        id: release_meta
        run: |
          python3 scripts/release_metadata.py prepare \
            --tag "${GITHUB_REF_NAME}" \
            --pubspec pubspec.yaml \
            --changelog CHANGELOG.md \
            --metadata-root fastlane/metadata/android \
            --github-output "$GITHUB_OUTPUT"

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create release commit
        id: release_commit
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
          VERSION_CODE: ${{ steps.release_meta.outputs.version_code }}
        run: |
          git switch -c "release/${RELEASE_TAG}"

          git add \
            pubspec.yaml \
            "fastlane/metadata/android/en-US/changelogs/${VERSION_CODE}.txt" \
            "fastlane/metadata/android/fr-FR/changelogs/${VERSION_CODE}.txt" \
            "fastlane/metadata/android/es-ES/changelogs/${VERSION_CODE}.txt" \
            "fastlane/metadata/android/de-DE/changelogs/${VERSION_CODE}.txt"

          if git diff --cached --quiet; then
            release_commit="$(git rev-parse HEAD)"
            echo "No file changes were required for ${RELEASE_TAG}; reusing ${release_commit}."
          else
            git commit -m "chore(release): prepare ${RELEASE_TAG}"
            release_commit="$(git rev-parse HEAD)"
            echo "Created release metadata commit ${release_commit}."
          fi

          echo "release_commit=${release_commit}" >> "$GITHUB_OUTPUT"

      - name: Ensure the release tag is available
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
        run: |
          if git rev-parse --verify "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release tag ${RELEASE_TAG} already exists locally." >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release tag ${RELEASE_TAG} already exists on origin." >&2
            exit 1
          fi

      - name: Push the release branch
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
        run: |
          git push --set-upstream origin "release/${RELEASE_TAG}"

      - name: Create and push the real release tag
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
        run: |
          git tag -a "${RELEASE_TAG}" -m "Release ${RELEASE_TAG}"
          git push origin "refs/tags/${RELEASE_TAG}"

      - name: Trigger the release workflow
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
        run: |
          # Tag pushes made with GITHUB_TOKEN do not trigger push workflows.
          gh workflow run release.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --ref "${DEFAULT_BRANCH}" \
            -f tag="${RELEASE_TAG}"
